# The default reusable workflow for 0xPolygon Solidity repos. The
# environment here is Foundry + Soldeer + Bun. Improvements ship to
# every consuming repo on its next PR (after dev → main).
#
# Each consuming repo selects which agent to run on each AI via the
# claude-agent / codex-agent inputs. Both default to "general".

name: Agentic Review (Default)

on:
  workflow_call:
    inputs:
      foundry-version:
        description: "Foundry release tag, or 'nightly'"
        type: string
        default: "nightly"
      install-soldeer:
        description: "Run `forge soldeer install` before review"
        type: boolean
        default: true
      claude-model:
        description: "Claude model identifier"
        type: string
        default: "claude-opus-4-7"
      codex-model:
        description: "Codex model identifier"
        type: string
        default: "gpt-5.3-codex"
      claude-agent:
        description: "Agent folder for Claude (under agents/)"
        type: string
        default: "general"
      codex-agent:
        description: "Agent folder for Codex (under agents/)"
        type: string
        default: "general"
      run-claude:
        description: "Enable the Claude agent"
        type: boolean
        default: true
      run-codex:
        description: "Enable the Codex agent"
        type: boolean
        default: true
    secrets:
      CLAUDE_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Claude Agent
  # ────────────────────────────────────────────────────────────────
  claude-agent:
    concurrency:
      group: claude-agent-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    name: Claude ${{ inputs.claude-agent }} Agent
    if: github.event_name == 'pull_request' && inputs.run-claude
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout consuming repo
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout central repo (for prompts)
        uses: actions/checkout@v5
        with:
          repository: 0xPolygon/smart-contracts-agentic-review
          ref: main
          path: .agentic-review

      - name: Verify Claude agent prompt exists
        run: |
          path=".agentic-review/agents/${{ inputs.claude-agent }}/CLAUDE_PROMPT.md"
          if [ ! -f "$path" ]; then
            echo "::error::Claude agent prompt not found: $path"
            echo "::error::Expected file at agents/${{ inputs.claude-agent }}/CLAUDE_PROMPT.md in the central repo."
            exit 1
          fi

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ inputs.foundry-version }}

      - name: Install Soldeer dependencies
        if: inputs.install-soldeer
        run: forge soldeer install

      - name: Compile contracts
        if: inputs.install-soldeer
        run: forge build || true

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        env:
          AGENT_NAME: ${{ inputs.claude-agent }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          prompt: "Run the PR security review as instructed by your system prompt. Post inline comments for 🔴/🟡 findings and a single PR-level summary using the exact header and Report format defined in your system prompt. Do not reply in chat — post to the PR."
          track_progress: true
          claude_args: |
            --model ${{ inputs.claude-model }}
            --max-turns 30
            --append-system-prompt-file .agentic-review/agents/${{ inputs.claude-agent }}/CLAUDE_PROMPT.md
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(forge build),Bash(forge test*),Bash(forge coverage*),Bash(forge inspect*),Bash(git diff*),Bash(git log*),Bash(git show*),Bash(cat CLAUDE.md),Bash(cat AGENTS.md),Bash(cat README.md),Bash(find * -name CLAUDE.md),Bash(find * -name AGENTS.md),Read,Glob,Grep"

  # ────────────────────────────────────────────────────────────────
  # 2. Codex Agent
  # ────────────────────────────────────────────────────────────────
  codex-agent:
    concurrency:
      group: codex-agent-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    name: Codex ${{ inputs.codex-agent }} Agent
    if: github.event_name == 'pull_request' && inputs.run-codex
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout consuming repo (PR merge ref)
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head"

      - name: Checkout central repo (for prompts)
        uses: actions/checkout@v5
        with:
          repository: 0xPolygon/smart-contracts-agentic-review
          ref: main
          path: .agentic-review

      - name: Verify Codex agent prompt exists
        run: |
          path=".agentic-review/agents/${{ inputs.codex-agent }}/CODEX_PROMPT.md"
          if [ ! -f "$path" ]; then
            echo "::error::Codex agent prompt not found: $path"
            echo "::error::Expected file at agents/${{ inputs.codex-agent }}/CODEX_PROMPT.md in the central repo."
            exit 1
          fi

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ inputs.foundry-version }}

      - name: Install Soldeer dependencies
        if: inputs.install-soldeer
        run: forge soldeer install

      - name: Compile contracts
        if: inputs.install-soldeer
        run: forge build || true

      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        env:
          AGENT_NAME: ${{ inputs.codex-agent }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ inputs.codex-model }}
          safety-strategy: drop-sudo
          sandbox: workspace-write
          prompt-file: .agentic-review/agents/${{ inputs.codex-agent }}/CODEX_PROMPT.md

      - name: Post Codex review
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.codex.outputs.final-message }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MODEL: ${{ inputs.codex-model }}
          AGENT_NAME: ${{ inputs.codex-agent }}
        with:
          github-token: ${{ github.token }}
          script: |
            const baseShort = process.env.BASE_SHA.slice(0, 7);
            const headShort = process.env.HEAD_SHA.slice(0, 7);
            const agent = process.env.AGENT_NAME.charAt(0).toUpperCase() + process.env.AGENT_NAME.slice(1);
            const body = [
              `# 🤖 Codex ${agent} Agent`,
              '',
              `Model: \`${process.env.MODEL}\` Base: \`${baseShort}\` Head: \`${headShort}\``,
              '',
              process.env.REVIEW_BODY,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  # ────────────────────────────────────────────────────────────────
  # 3. Interactive @claude Assistant
  # ────────────────────────────────────────────────────────────────
  claude-assistant:
    concurrency:
      group: claude-assistant-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false
    name: Claude Assistant
    if: |
      inputs.run-claude && (
        (github.event_name == 'issue_comment'
          && contains(github.event.comment.body, '@claude')
          && github.event.issue.pull_request != null
          && contains(fromJson('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association))
        || (github.event_name == 'pull_request_review_comment'
          && contains(github.event.comment.body, '@claude')
          && contains(fromJson('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association))
        || (github.event_name == 'pull_request_review'
          && contains(github.event.review.body, '@claude')
          && contains(fromJson('["MEMBER","OWNER","COLLABORATOR"]'), github.event.review.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout consuming repo
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ inputs.foundry-version }}

      - name: Install Soldeer dependencies
        if: inputs.install-soldeer
        run: forge soldeer install

      - name: Compile contracts
        if: inputs.install-soldeer
        run: forge build || true

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          claude_args: |
            --model ${{ inputs.claude-model }}
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(forge build),Bash(forge test*),Bash(forge coverage*),Bash(forge inspect*),Bash(git diff*),Bash(git log*),Bash(git show*),Read,Glob,Grep"
